---
_zabbix_web_user:
  apache: wwwrun
  nginx: nginx
_zabbix_web_group:
  apache: wwwrun
  nginx: nginx
_zabbix_web_vhost_location:
  apache: /etc/apache2/conf.d/zabbix.conf
  nginx: /etc/nginx/conf.d/zabbix.conf

_apache_log: apache2
_apache_service: apache2

_zabbix_php_fpm_dir: "/etc/php8/fpm/php-fpm.d"
_zabbix_php_fpm_session: /var/lib/php8/sessions
_zabbix_php_fpm_listen: /run/php-fpm/zabbix.sock

_zabbix_web_package: "zabbix-web-{{ zabbix_server_database }}"
_zabbix_web_apache_packages:
  - zabbix-apache-conf
_zabbix_web_nginx_packages:
  - zabbix-nginx-conf
