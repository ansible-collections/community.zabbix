---
- name: "Nginx | Set websrv specific variables"
  ansible.builtin.set_fact:
    zabbix_web_user: "{{ zabbix_web_user if zabbix_web_user is defined else _nginx_user }}"
    zabbix_web_group: "{{ zabbix_web_group if zabbix_web_group is defined else _nginx_group }}"
    zabbix_web_vhost_location: "{{ zabbix_web_vhost_location if zabbix_web_vhost_location is defined else _nginx_vhost_location }}"
    zabbix_nginx_log_path: "{{ zabbix_nginx_log_path if zabbix_nginx_log_path is defined else _nginx_log_path }}"
    zabbix_nginx_service: "{{ zabbix_nginx_service if zabbix_nginx_service is defined else _nginx_service }}"
  tags:
    - config
    - install

- name: "Nginx | Installing Zabbix Nginx Conf"
  package:
    name: "{{ _zabbix_web_nginx_packages + _zabbix_web_nginx_php_dependencies | default([]) }}"
    state: "{{ zabbix_web_package_state }}"
    update_cache: true
    disablerepo: "{{ zabbix_web_disable_repo | default(_zabbix_web_disable_repo | default(omit)) }}"
  environment:
    http_proxy: "{{ zabbix_http_proxy | default('') }}"
    https_proxy: "{{ zabbix_https_proxy | default('') }}"
  register: zabbix_nginx_conf_install
  until: zabbix_nginx_conf_install is succeeded
  become: true
  tags:
    - install

- name: "Nginx | Gather package facts for HTTP/2 syntax detection"
  ansible.builtin.package_facts:
    manager: auto
  become: true
  when:
    - zabbix_web_create_vhost
    - zabbix_web_tls
    - zabbix_web_tls_http2
  tags:
    - config

- name: "Nginx | Default HTTP/2 syntax values"
  ansible.builtin.set_fact:
    zabbix_web_http2_directive: ""
    zabbix_web_http2_listen_option: ""
  when:
    - zabbix_web_create_vhost
    - zabbix_web_tls
  tags:
    - config

- name: "Nginx | Detect installed Nginx version"
  ansible.builtin.set_fact:
    zabbix_web_nginx_installed_version: "{{ ((ansible_facts.packages[item] | first).version | split(':') | last | split('-') | first) | default('0.0.0', true) }}"
  loop:
    - nginx
    - nginx-core
    - nginx-full
    - nginx-light
  when:
    - zabbix_web_create_vhost
    - zabbix_web_tls
    - zabbix_web_tls_http2
    - ansible_facts.packages[item] is defined
    - (zabbix_web_nginx_installed_version | default('')) == ''
  tags:
    - config

- name: "Nginx | Determine HTTP/2 syntax flags"
  ansible.builtin.set_fact:
    zabbix_web_http2_directive: "{{ 'http2 on;' if (zabbix_web_nginx_installed_version | default('0.0.0')) is version('1.25.1', '>=') else '' }}"
    zabbix_web_http2_listen_option: "{{ ' http2' if (zabbix_web_nginx_installed_version | default('0.0.0')) is version('1.25.1', '<') else '' }}"
  when:
    - zabbix_web_create_vhost
    - zabbix_web_tls
    - zabbix_web_tls_http2
  tags:
    - config

- name: "Nginx | Install vhost in conf.d"
  ansible.builtin.template:
    src: nginx_vhost.conf.j2
    dest: "{{ zabbix_web_vhost_location }}"
    owner: "{{ zabbix_web_user }}"
    group: "{{ zabbix_web_group }}"
    mode: 0644
  when:
    - zabbix_web_create_vhost
  become: true
  notify:
    - restart nginx
  tags:
    - config
