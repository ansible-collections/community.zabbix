---
dependency:
  name: galaxy
  enabled: true
  options:
    requirements-file: molecule/default/collections.yml

driver:
  name: default

platforms:
  - name: zabbix-web-${MY_MOLECULE_VERSION:-v74}-${MY_MOLECULE_DATABASE:-mysql}-${MY_MOLECULE_CONTAINER:-rockylinux10}
    image: geerlingguy/docker-${MY_MOLECULE_IMAGE:-rockylinux10}-ansible:latest
    privileged: true
    pre_build_image: true
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    networks:
      - name: zabbix
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    groups:
      - ${MY_MOLECULE_DATABASE:-mysql}
      - ${MY_MOLECULE_VERSION:-v74}
      - ${MY_MOLECULE_WEB_SERVER:-apache}

provisioner:
  name: ansible
  playbooks:
    create: create.docker.yml
    destroy: destroy.docker.yml
  env:
    # https://github.com/ansible/molecule/issues/4015#issuecomment-1680859724
    ANSIBLE_ROLES_PATH: ../../roles
    ANSIBLE_INJECT_FACT_VARS: "False"
  inventory:
    group_vars:
      all:
        ansible_connection: community.docker.docker
        zabbix_server_dbuser: zabbix
        zabbix_server_dbpassword: zabbix
        zabbix_server_dbhost: "{{ inventory_hostname }}-db"
        zabbix_server_dbname: zabbix
        zabbix_api_server_url: zabbix-web-${MY_MOLECULE_VERSION:-v74}-${MY_MOLECULE_DATABASE:-mysql}-${MY_MOLECULE_CONTAINER:-rockylinux10}
      v74:
        zabbix_server_version: 7.4
        zabbix_web_version: 7.4
      v72:
        zabbix_server_version: 7.2
        zabbix_web_version: 7.2
      v70:
        zabbix_server_version: 7.0
        zabbix_web_version: 7.0
      v60:
        zabbix_server_version: 6.0
        zabbix_web_version: 6.0
      mysql:
        zabbix_server_database: mysql
      pgsql:
        zabbix_server_database: pgsql
      apache:
        zabbix_web_http_server: apache
      nginx:
        zabbix_web_http_server: nginx

verifier:
  name: testinfra
