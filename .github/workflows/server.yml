---
name: "community.zabbix.zabbix_server"
on:
  workflow_call:
  push:
    paths:
      - "roles/zabbix_server/**"
      - "molecule/zabbix_server/**"
      - "molecule/requirements.txt"
      - ".github/workflows/server.yml"
      - "roles/zabbix_repo/**"
  pull_request:
    paths:
      - "roles/zabbix_server/**"
      - "molecule/zabbix_server/**"
      - "molecule/requirements.txt"
      - ".github/workflows/server.yml"
      - "roles/zabbix_repo/**"
concurrency:
  group: server-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true
jobs:
  build-collection:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: molecule/requirements.txt

      - name: Install latest pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r molecule/requirements.txt

      - name: Build the collection
        run: |
          # Pin versions to speed up CI
          sed -i 's/ansible\.windows:\s*"\*"/ansible.windows: "2.8.0"/' galaxy.yml
          sed -i 's/ansible\.netcommon:\s*"\*"/ansible.netcommon: "7.2.0"/' galaxy.yml
          sed -i 's/ansible\.posix:\s*"\*"/ansible.posix: "2.0.0"/' galaxy.yml
          sed -i 's/community\.general:\s*"\*"/community.general: "10.5.0"/' galaxy.yml
          sed -i 's/community\.mysql:\s*"\*"/community.mysql: "3.13.0"/' galaxy.yml
          sed -i 's/community\.postgresql:\s*"\*"/community.postgresql: "3.12.0"/' galaxy.yml

          ansible-galaxy collection build -f

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-collection
          path: community-zabbix-*.tar.gz

  molecule:
    needs: build-collection
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        container:
          - image: rockylinux10
          - image: rockylinux9
          - image: rockylinux8
            ansible_core: ansible-core<2.17
          - image: ubuntu2404
          - image: ubuntu2204
          - image: debian12
          - image: debian11
          - image: opensuseleap15
            ansible_core: ansible-core<2.17
        collection_role:
          - zabbix_server
        database:
          - mysql
          - pgsql
        version:
          - v74
          - v72
          - v70
          - v60
        exclude:
          - container:
              image: rockylinux10
            version: v72
          - container:
              image: rockylinux10
            version: v70
          - container:
              image: rockylinux10
            version: v60
          - container:
              image: debian11
            version: v74
          - container:
              image: debian11
            version: v72
          - container:
              image: debian11
            version: v70
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: molecule/requirements.txt

      - name: Install latest pip
        run: python -m pip install --upgrade pip

      - name: Cache Ansible Galaxy content
        uses: actions/cache@v4
        with:
          path: |
            ~/.ansible/collections
            ~/.ansible/roles
            ~/.cache/ansible-compat
          key: ${{ runner.os }}-server-${{ matrix.container.image }}-${{ hashFiles('molecule/requirements.txt', 'molecule/default/collections.yml') }}
          restore-keys: |
            ${{ runner.os }}-server-${{ matrix.container.image }}-
            ${{ runner.os }}-server-

      - name: Install specific version ansible-core
        if: matrix.container.ansible_core != null
        run: pip install "${{ matrix.container.ansible_core }}"

      - name: Install dependencies
        run: pip install -r molecule/requirements.txt

      - name: Download collection artifact
        uses: actions/download-artifact@v4
        with:
          name: server-collection

      - name: Install the collection
        run: ansible-galaxy collection install -vvvv community-zabbix-*.tar.gz

      - name: Run role tests
        run: >-
          MY_MOLECULE_CONTAINER=${{ matrix.container.image }}
          MY_MOLECULE_IMAGE=${{ matrix.container.image }}
          MY_MOLECULE_VERSION=${{ matrix.version }}
          MY_MOLECULE_DATABASE=${{ matrix.database }}
          MY_MOLECULE_DOCKER_COMMAND=${{ matrix.command }}
          molecule test -s ${{ matrix.collection_role }}
